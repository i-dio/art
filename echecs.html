<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>i-dio - Échecs</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
#board{display:grid;grid-template:repeat(8,50px)/repeat(8,50px);margin:20px auto;max-width:90vw}
.square{width:50px;height:50px;display:flex;justify-content:center;align-items:center;font-size:2em;cursor:pointer}
.white{background:#eee;color:#000}
.black{background:#666;color:#fff}
a{display:block;margin:10px;color:#fff;text-decoration:none}
</style>
</head>
<body>
<h1>ÉCHECS</h1>
<div id="board"></div>
<a href="index.html">← retour</a>

<script>
// initialisation
const board = document.getElementById('board');
let selected=null;
const squares=[];

// configuration initiale
const startPos = [
['♜','♞','♝','♛','♚','♝','♞','♜'],
['♟','♟','♟','♟','♟','♟','♟','♟'],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['','','','','','','',''],
['♙','♙','♙','♙','♙','♙','♙','♙'],
['♖','♘','♗','♕','♔','♗','♘','♖']
];

// Création des cases
for(let y=0;y<8;y++){
  for(let x=0;x<8;x++){
    let sq = document.createElement('div');
    sq.className='square '+((x+y)%2?'black':'white');
    sq.dataset.x=x; sq.dataset.y=y;
    sq.innerText = startPos[y][x];
    board.appendChild(sq);
    squares.push(sq);

    // clic sur la case
    sq.addEventListener('click', ()=>{
      if(selected){
        // tente de déplacer la pièce
        if(isLegalMove(selected,sq)){
          sq.innerText=selected.innerText;
          selected.innerText='';
        }
        selected=null;
      } else if(sq.innerText) {
        selected = sq;
      }
    });
  }
}

// règles minimales (exemple simplifié)
function isLegalMove(from,to){
  const piece = from.innerText;
  const dx = to.dataset.x - from.dataset.x;
  const dy = to.dataset.y - from.dataset.y;

  if(piece==='♙'){ // pion blanc simple
    if(dx==0 && dy==-1 && !to.innerText) return true;
    if(Math.abs(dx)==1 && dy==-1 && to.innerText && to.innerText.match(/[♟♞♝♜♛♚]/)) return true;
  }
  if(piece==='♟'){ // pion noir simple
    if(dx==0 && dy==1 && !to.innerText) return true;
    if(Math.abs(dx)==1 && dy==1 && to.innerText && to.innerText.match(/[♙♘♗♖♕♔]/)) return true;
  }
  // autres pièces à compléter...
  // ♘♞ cavalier, ♗♝ fou, ♖♜ tour, ♕♛ reine, ♔♚ roi
  return false;
}
</script>
</body>
</html>
