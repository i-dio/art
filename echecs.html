<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>i-dio - Échecs</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard.min.css">
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
#board{width:90vw;max-width:400px;margin:20px auto} /* largeur responsive */
a{display:block;margin:10px;color:#fff;text-decoration:none}
</style>
</head>
<body>
<h1>ÉCHECS</h1>
<div id="board"></div>
<a href="index.html">← retour</a>

<!-- Librairies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script src="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard.min.js"></script>

<!-- Fond animé -->
<script src="bg.js"></script>

<script>
// S'assurer que le DOM est chargé
document.addEventListener('DOMContentLoaded', () => {
  var game = new Chess();
  var board = Chessboard('board', {
    draggable: true,
    position: 'start',
    onDragStart: (source, piece) => {
      if (game.game_over()) return false;
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
    },
    onDrop: (source, target) => {
      var move = game.move({from: source, to: target, promotion: 'q'});
      if (move === null) return 'snapback';
    },
    onSnapEnd: () => {
      board.position(game.fen());
    }
  });
});
</script>
</body>
</html>
